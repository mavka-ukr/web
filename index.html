<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мавка</title>

    <link rel="icon" type="image/png" href="./мавка.png" />
    <link rel="icon" sizes="any" type="image/svg+xml" href="./мавка.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-color: #ffffff;
        --text-color: #121212;
        --color-red: #cc0000;
        --color-green: #008800;
        --color-blue: #0000cc;
        --color-yellow: #b58500;
      }

      html.dark {
        --bg-color: black;
        --text-color: #f5f5f5;
        --color-red: #ff6b6b;
        --color-green: #4cd964;
        --color-blue: #5ac8fa;
        --color-yellow: #ffcc00;
      }

      html,
      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: "Fira Code", monospace;
        margin: 0;
        padding: 0;
        height: 100%;
      }

      * {
        font-family: "Fira Code", monospace;
        font-size: 1rem;
      }

      #terminal {
        min-height: 100%;
        box-sizing: border-box;
        padding: 10px;
        cursor: text;
      }

      .terminal-row {
        display: flex;
        align-items: center;
        width: 100%;
        white-space: pre-wrap;
      }

      .terminal-row span {
        white-space: pre-wrap;
      }

      input {
        flex: 1;
        font-size: 1rem;
        background: transparent;
        color: inherit;
        border: none;
        outline: none;
        padding: 0;
        font-family: inherit;
      }

      .term-color-red {
        color: var(--color-red);
      }
      .term-color-green {
        color: var(--color-green);
      }
      .term-color-blue {
        color: var(--color-blue);
      }
      .term-color-yellow {
        color: var(--color-yellow);
      }
      .term-color-default {
        color: inherit;
      }

      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: var(--bg-color);
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb {
        background: #5c6370;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #abb2bf;
      }
    </style>
  </head>
  <body>
    <div id="terminal"></div>
    <script>
      if (window.location.hostname !== "веб.мавка.укр") {
        window.MAVKA_WEB_URL = window.location.origin;
      }

      window.addEventListener("message", (event) => {
        if (event.data === "FOCUS") {
          document.querySelector("input").focus();
        }
      });

      function getQueryVal(key, url = window.location.href) {
        return new URL(url).searchParams.get(key);
      }

      const themeFromQuery = getQueryVal("тема");
      const isSystemDark = window.matchMedia(
        "(prefers-color-scheme: dark)",
      ).matches;

      if (isSystemDark || themeFromQuery === "темна") {
        document.documentElement.classList.add("dark");
      }

      if (themeFromQuery === "світла") {
        document.documentElement.classList.remove("dark");
      }

      let initialCommands = [];
      const rowsFromQuery = getQueryVal("рядки");

      if (rowsFromQuery) {
        try {
          initialCommands = JSON.parse(rowsFromQuery);
        } catch (e) {
          console.error(e);
        }
      }

      const script = document.createElement("script");
      script.src = "./mavka_web.js?=d" + Date.now();
      script.async = true;

      script.onload = () => {
        start();
      };

      script.onerror = (e) => {
        alert("Не вдалося завантажити скрипт.");
        console.error(e);
      };

      document.head.appendChild(script);

      const start = async () => {
        const availableVersions = await Mavka.fetchAvailableVersions();

        const versionFromQuery = getQueryVal("в");

        const matchedVersion = [...availableVersions]
          .reverse()
          .find((v) => v.mavka === versionFromQuery);

        const finalVersion =
          matchedVersion || availableVersions[availableVersions.length - 1];

        const PACKAGE_VERSION = finalVersion.pkg;
        const MAVKA_VERSION = finalVersion.mavka;

        document.title = `Мавка ${MAVKA_VERSION}`;

        const terminal = document.getElementById("terminal");

        terminal.addEventListener("click", () => {
          const selection = window.getSelection().toString();
          if (!selection) {
            const inputEl = document.getElementById("input");
            if (inputEl) {
              inputEl.focus();
            }
          }
        });

        const mavka = new Mavka(PACKAGE_VERSION, {
          print: (value, color) => {
            const colorClass = `term-color-${color || "default"}`;
            terminal.innerHTML += `<span class="${colorClass}" style="white-space: pre-wrap;">${value.replaceAll("\n", "<br>")}</span>`;
          },
          readline: (callback, prefix) => {
            const rowEl = document.createElement("div");
            rowEl.className = "terminal-row";

            if (prefix) {
              const prefixEl = document.createElement("span");
              prefixEl.innerHTML = prefix.replaceAll("\n", "<br>");
              rowEl.appendChild(prefixEl);
            }

            if (initialCommands.length) {
              const cmd = initialCommands.shift();
              const textNode = document.createTextNode(cmd);
              rowEl.appendChild(textNode);
              terminal.appendChild(rowEl);
              callback(cmd);
              return;
            }

            const inputEl = document.createElement("input");
            inputEl.id = "input";
            inputEl.autocapitalize = "off";
            inputEl.autocorrect = "off";
            rowEl.appendChild(inputEl);

            terminal.appendChild(rowEl);
            inputEl.focus();

            inputEl.addEventListener("keydown", function handleEnter(event) {
              if (event.key === "Enter") {
                const inputValue = inputEl.value;
                inputEl.removeEventListener("keydown", handleEnter);
                inputEl.removeAttribute("id");

                const textNode = document.createTextNode(inputValue);
                inputEl.parentNode.replaceChild(textNode, inputEl);

                callback(inputValue);
              }
            });
          },
        });

        await mavka.load();

        const resultCode = await mavka.run();

        console.log("Mavka exited with code", resultCode);
      };
    </script>
  </body>
</html>
